services:
    minio:
        image: minio/minio:latest
        container_name: minio
        environment:
            MINIO_ROOT_USER: minioadmin
            MINIO_ROOT_PASSWORD: minioadmin            
            # Optional: Automatically create a default bucket on startup
            MINIO_DEFAULT_BUCKETS: 'testbucket'            
            # Parquet is DISABLED by default since hostile crafted input can easily crash the server.
            MINIO_API_SELECT_PARQUET: on
        ports:
            - 9000:9000
            - 9001:9001
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
            interval: 30s
            timeout: 10s
            retries: 5
        command: [ "server", "--console-address", ":9001", "/data" ]
        volumes:
            - minio_data:/data
        
    minio-buckets:
        image: minio/mc:latest
        depends_on:
            - minio
        restart: on-failure
        entrypoint: >
            /bin/sh -c "
            /usr/bin/mc alias set dockerminio http://minio:9000 minioadmin minioadmin;
            /usr/bin/mc mb dockerminio/yourbucketname;
            exit 0;
            "
    
    volumes:
        minio_data: